<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topic Network | Group Wiki</title>
  <link rel="stylesheet" href="../assets/css/topic.css" />

  <script
    src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"
    defer
  ></script>
  <script src="../assets/js/topic.js" defer></script>
</head>
<body>
  <div class="topic-page">
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

    <header class="topic-header">
      <div class="title-wrap">
        <h1>Research Relationship Network</h1>
        <p>People ↔ Topics multi-to-multi visualization</p>
      </div>

      <div class="toolbar" aria-label="View mode switch">
        <button id="modePeopleBtn" class="mode-btn active" type="button">
          People View
        </button>
        <button id="modeTopicBtn" class="mode-btn" type="button">
          Topic View
        </button>
      </div>
    </header>

    <main class="topic-layout">
      <section class="panel network-panel" aria-labelledby="network-title">
        <div class="panel-head">
          <span id="network-title" class="panel-title">Network Graph</span>
        </div>
        <div id="network" aria-label="Research relationship network graph"></div>
      </section>

      <section class="panel info-panel" aria-labelledby="explorer-title">
        <div class="panel-head">
          <span id="explorer-title" class="panel-title">Relationship Explorer</span>
        </div>

        <div id="selectionMeta" class="selection-meta">
          Click a node or an edge to inspect the relationship.
        </div>

        <div class="info-body">
          <div class="info-block">
            <h2>Tree View</h2>
            <div id="treeContainer" class="tree-container">
              <div class="empty-state">No selection yet.</div>
            </div>
          </div>

          <div class="info-block">
            <h2>Detail</h2>
            <div id="detailContainer" class="detail-container">
              <div class="empty-state">No detail yet.</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
