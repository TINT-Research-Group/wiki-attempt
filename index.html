<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TINT Research Wiki</title>
  <meta name="description" content="TINT Research Group Wiki Portal" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="bg-grid"></div>
    <div class="bg-radial bg-radial-1"></div>
    <div class="bg-radial bg-radial-2"></div>
    <div class="scanline"></div>

    <main class="portal">
      <!-- Cover Lock -->
      <section class="cover-lock" aria-label="Research gateway lock">
        <div class="lock-frame">
          <div class="lock-topline">TINT.Gateway.01 · Security Layer · Verified Protocol</div>

          <div class="lock-core">
            <div class="lock-ring">
              <div class="lock-ring-inner"></div>
              <div class="lock-center"></div>
            </div>
          </div>

          <div class="lock-meta">
            <div class="lock-label">Iris Access / Research Wiki Gateway</div>
            <div class="lock-status">
              <span class="status-dot"></span>
              <span>Standby · Authorized Navigation Ready</span>
            </div>
          </div>
        </div>
      </section>

      <nav class="portal-grid" aria-label="Wiki navigation">
        <a class="portal-btn" href="members.html">
          <span class="btn-label">Members</span>
        </a>

        <a class="portal-btn" href="research.html">
          <span class="btn-label">Research Directions</span>
        </a>

        <a class="portal-btn" href="projects.html">
          <span class="btn-label">Projects</span>
        </a>

        <a class="portal-btn" href="pages/topic.html">
          <span class="btn-label">Topic Network</span>
        </a>

        <a class="portal-btn" href="resources.html">
          <span class="btn-label">Resources</span>
        </a>

        <a class="portal-btn" href="reports.html">
          <span class="btn-label">Meetings & Reports</span>
        </a>
      </nav>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
